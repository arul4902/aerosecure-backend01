<nav class="navbar" *ngIf="authService.isAuthenticated()">
  <div class="nav-container">
    <div class="nav-brand" routerLink="/dashboard">
      <span class="brand-icon">▲</span>
      <span class="brand-text">AeroSecure</span>
    </div>
    
    <div class="nav-links">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">Fleet Dashboard</a>
      <a *ngIf="authService.isAdmin()" routerLink="/admin/users" routerLinkActive="active" class="nav-link">User Admin</a>
    </div>

    <div class="nav-user">
      <div class="user-info">
        <span class="username">{{ authService.getUsername() }}</span>
        <span class="role-badge" [class.badge-admin]="authService.isAdmin()">
          {{ authService.isAdmin() ? 'Admin' : 'Engineer' }}
        </span>
      </div>
      <button (click)="logout()" class="logout-btn" title="Logout">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logout-icon">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </div>
  </div>
</nav>
