# ============================================
# AeroSecure - Application Configuration
# ============================================

# Server
server.port=8080

# ============================================
# MySQL Database Configuration
# NOTE: Change username/password below to match YOUR MySQL credentials
# The database and tables are auto-created on first run
# Sample data (users + aircraft) is auto-seeded via schema.sql + data.sql
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/aerosecure_db_clean?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=arul2004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=update

# ============================================
# SQL Data Seed (schema.sql + data.sql)
# ============================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# JWT Configuration
# ============================================
app.jwt.secret=AeroSecure2026SuperSecretKeyForJWTTokenGenerationAndValidationMinimum256Bits!!
app.jwt.expiration-ms=86400000

# ============================================
# Swagger / OpenAPI Configuration
# ============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================
# Logging
# ============================================
logging.level.com.aerosecure=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
